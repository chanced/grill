[package]
name = "grill-core"
version = "0.0.0"
edition = "2021"
description = "wip"
license = "MIT OR Apache-2.0"
repository = "https://github.com/chanced/grill"
authors = ["chance dinkins"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
serde_with = "1.13"
dashmap = "5.3"
regex = "1.5"
url = "2.2.2"
petgraph = "0.6"
parking_lot = "0.12"
once_cell = { version = "1.10", features = ["parking_lot"] }
bigdecimal = { version = "0.3", features = ["serde"], optional = true }
num-bigint = { version = "0.4", features = ["serde"], optional = true }
num-integer = { version = "0.1", optional = true }
num-traits = { version = "0.2", optional = true }
paste = "1.0"
jsonptr = "0.1"
heck = "0.4.0"
# json-pointer = "0.3.4"
[features]
big_num = ["bigdecimal", "num-bigint", "num-integer", "num-traits"]
